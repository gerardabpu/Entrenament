<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificació d'Entrenament - Gerard Abril Pujadas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Fira Sans',system-ui,sans-serif;background:#F7F5F2;color:#1C1917;min-height:100vh;}
button{font-family:'Fira Sans',system-ui,sans-serif;cursor:pointer;}
.nav{background:#F7F5F2;border-bottom:1px solid #E5E1DC;position:sticky;top:0;z-index:100;padding:0 20px;}
.nav-title{display:flex;align-items:baseline;justify-content:space-between;padding:14px 0 10px;}
.nav-title h1{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
.nav-title span{font-size:11px;font-weight:300;color:#78716C;}
.nav-tabs{display:flex;gap:0;border-bottom:1px solid #E5E1DC;margin:0 -20px;padding:0 20px;}
.nav-tab{font-size:14px;font-weight:400;color:#78716C;background:transparent;border:none;border-bottom:2px solid transparent;padding:10px 20px 11px;margin-bottom:-1px;transition:all 0.15s;}
.nav-tab.active{font-weight:600;color:#1C1917;border-bottom-color:#1C1917;}
.tab{display:none;padding:20px;}
.tab.active{display:block;}
.week-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.week-nav-btn{width:32px;height:32px;border-radius:6px;border:1px solid #E5E1DC;background:transparent;color:#78716C;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.week-nav-btn:disabled{opacity:0.3;cursor:default;}
.week-info{flex:1;}
.week-title{font-size:15px;font-weight:600;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.week-sub{font-size:11px;font-weight:300;color:#78716C;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;}
.badge-green{color:#2D5016;background:#EEF3E8;}
.badge-amber{color:#92400E;background:#FFFBEB;}
.badge-orange{color:#B45309;background:#FFF7ED;}
.progress-wrap{margin-bottom:14px;}
.progress-bar-bg{height:2px;background:#E5E1DC;border-radius:1px;}
.progress-bar-fill{height:100%;border-radius:1px;transition:width 0.4s ease;}
.progress-labels{display:flex;justify-content:space-between;margin-top:4px;}
.progress-labels span{font-size:11px;font-weight:300;color:#78716C;}
.progress-labels strong{font-size:11px;font-weight:500;}
.sessions-bloc{display:flex;flex-direction:column;gap:1px;}
.session-card{border:1px solid #E5E1DC;background:#FFFFFF;overflow:hidden;}
.session-card:first-child{border-radius:10px 10px 0 0;}
.session-card:last-child{border-radius:0 0 10px 10px;}
.session-card.done-trail{background:#EEF3E8;border-color:#D1E8C4;}
.session-card.done-bici{background:#F0F9FF;border-color:#BAE6FD;}
.session-card.done-push{background:#F5F3FF;border-color:#DDD6FE;}
.session-card.done-legs{background:#F0F9FF;border-color:#BAE6FD;}
.session-card.done-pull{background:#EEF3E8;border-color:#D1E8C4;}
.session-card.today{border-color:rgba(28,25,23,0.3);}
.session-card.race{background:#FEF2F2;border-color:rgba(185,28,28,0.4);}
.session-card+.session-card{border-top:none;}
.session-row{display:flex;align-items:center;gap:12px;padding:12px 14px;}
.session-day{min-width:44px;}
.session-day-label{font-size:12px;font-weight:400;color:#78716C;}
.session-day-label.today{font-weight:600;color:#1C1917;}
.session-day-date{font-size:11px;font-weight:300;color:#78716C;}
.session-body{flex:1;}
.session-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px;}
.session-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.session-meta span{font-size:11px;color:#78716C;}
.session-actions{display:flex;gap:6px;flex-shrink:0;}
.btn-small{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #C8C2BB;background:transparent;color:#78716C;}
.btn-done{font-size:12px;font-weight:500;padding:4px 10px;border-radius:6px;border:1px solid #C8C2BB;background:transparent;color:#78716C;transition:all 0.15s;}
.btn-done.done-trail{border-color:#2D5016;background:#2D5016;color:#fff;}
.btn-done.done-bici{border-color:#0369A1;background:#0369A1;color:#fff;}
.btn-done.done-push{border-color:#7C3AED;background:#7C3AED;color:#fff;}
.btn-done.done-legs{border-color:#0369A1;background:#0369A1;color:#fff;}
.btn-done.done-pull{border-color:#2D5016;background:#2D5016;color:#fff;}
.session-desc{padding:0 14px 10px;font-size:12px;font-weight:300;color:#78716C;line-height:1.65;}
.chip{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;letter-spacing:0.04em;}
.chip-trail{color:#2D5016;background:#EEF3E8;border:1px solid #D1E8C4;}
.chip-bici{color:#0369A1;background:#F0F9FF;border:1px solid #BAE6FD;}
.rir{font-size:10px;font-weight:500;padding:1px 6px;border-radius:20px;background:#F7F5F2;border:1px solid #E5E1DC;}
.rir-hard{color:#B91C1C;}
.rir-med{color:#92400E;}
.rir-easy{color:#78716C;}
.exercici-bloc{border-top:1px solid #E5E1DC;}
.exercici-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #E5E1DC;}
.exercici-row:last-child{border-bottom:none;}
.exercici-row:nth-child(even){background:rgba(0,0,0,0.01);}
.exercici-info{flex:1;}
.exercici-nom{font-size:13px;font-weight:400;color:#1C1917;}
.exercici-nom.principal{font-weight:500;}
.exercici-muscles{font-size:11px;font-weight:300;color:#78716C;}
.exercici-series{font-family:monospace;font-size:12px;color:#1C1917;background:#F7F5F2;padding:2px 8px;border-radius:6px;border:1px solid #E5E1DC;white-space:nowrap;}
.kg-input{width:58px;font-family:'Fira Sans',system-ui,sans-serif;font-size:12px;padding:5px 7px;border-radius:6px;border:1px solid #E5E1DC;background:#F7F5F2;color:#1C1917;outline:none;text-align:center;}
.session-dots{display:flex;gap:6px;margin-top:16px;justify-content:center;}
.dot{height:4px;flex:1;max-width:60px;border-radius:2px;background:#E5E1DC;transition:background 0.2s;}
.btn-avui{width:100%;margin-top:16px;padding:10px;background:transparent;border:1px solid #E5E1DC;border-radius:8px;color:#78716C;font-size:12px;}
.overview-bloc{margin-bottom:28px;}
.overview-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.overview-bar{width:3px;height:14px;border-radius:2px;}
.overview-title{font-size:13px;font-weight:500;}
.overview-count{font-size:11px;font-weight:300;color:#78716C;margin-left:auto;}
.overview-rows{display:flex;flex-direction:column;gap:1px;}
.overview-row{display:flex;align-items:center;gap:12px;padding:9px 12px;cursor:pointer;border:1px solid #E5E1DC;background:transparent;}
.overview-row:first-child{border-radius:8px 8px 0 0;}
.overview-row:last-child{border-radius:0 0 8px 8px;}
.overview-row+.overview-row{border-top:none;}
.overview-row.current{background:#FFFFFF;}
.mini-dot{width:20px;height:4px;border-radius:2px;background:#E5E1DC;}
.alert{padding:8px 12px;border-radius:8px;font-size:11px;font-weight:300;line-height:1.6;margin-bottom:12px;}
.alert-orange{background:#FFF7ED;border:1px solid rgba(180,83,9,0.3);color:#B45309;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.stat-card{padding:14px 16px;border-radius:10px;border:1px solid #E5E1DC;background:#FFFFFF;}
.stat-val{font-size:22px;font-weight:600;letter-spacing:-0.5px;}
.stat-unit{font-size:11px;font-weight:300;color:#78716C;margin-left:3px;}
.stat-label{font-size:11px;font-weight:300;color:#78716C;margin-top:3px;}
.phase-bar-row{margin-bottom:12px;}
.phase-bar-header{display:flex;justify-content:space-between;margin-bottom:4px;}
.phase-bar-bg{height:3px;background:#E5E1DC;border-radius:2px;}
.phase-bar-fill{height:100%;border-radius:2px;}
.progres-card{border-radius:10px;border:1px solid #E5E1DC;background:#FFFFFF;padding:14px 16px;margin-bottom:10px;}
.progres-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.mini-bars{display:flex;gap:4px;flex-wrap:wrap;}
.mini-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.mini-bar-bg{width:24px;height:40px;display:flex;align-items:flex-end;}
.mini-bar-fill{width:100%;border-radius:2px 2px 0 0;}
.mini-bar-s{font-size:9px;color:#78716C;}
.mini-bar-kg{font-size:9px;font-weight:500;}
.chart-wrap{display:flex;gap:3px;flex-wrap:wrap;align-items:flex-end;}
.chart-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:18px;}
.chart-bars{width:100%;height:48px;display:flex;align-items:flex-end;gap:1px;}
.chart-bar{flex:1;border-radius:2px 2px 0 0;}
.chart-legend{display:flex;gap:12px;margin-top:8px;}
.chart-legend-item{display:flex;align-items:center;gap:4px;}
.chart-legend-dot{width:10px;height:3px;border-radius:1px;}
.section-card{border-radius:10px;border:1px solid #E5E1DC;background:#FFFFFF;padding:16px;margin-bottom:12px;}
.section-title{font-size:12px;font-weight:500;margin-bottom:14px;}
@keyframes spin{to{transform:rotate(360deg);}}

.meal-card{border-radius:10px;border:1px solid #E5E1DC;background:#FFFFFF;overflow:hidden;margin-bottom:8px;}
.meal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
.meal-title{font-size:13px;font-weight:500;color:#1C1917;}
.meal-macros{display:flex;gap:8px;flex-wrap:wrap;}
.macro-badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;}
.meal-body{padding:0 14px 14px;border-top:1px solid #E5E1DC;}
.ingredients-list{margin:10px 0 8px;padding-left:16px;}
.ingredients-list li{font-size:12px;font-weight:300;color:#78716C;line-height:1.8;}
.prep-list{margin:0;padding-left:16px;}
.prep-list li{font-size:12px;font-weight:300;color:#1C1917;line-height:1.8;}
.macro-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.macro-bar-label{font-size:11px;font-weight:300;color:#78716C;min-width:70px;}
.macro-bar-bg{flex:1;height:4px;background:#E5E1DC;border-radius:2px;}
.macro-bar-fill{height:100%;border-radius:2px;transition:width 0.4s;}
.macro-bar-val{font-size:11px;font-weight:500;color:#1C1917;min-width:40px;text-align:right;}
.day-type-btn{padding:8px 14px;border-radius:8px;border:1px solid #E5E1DC;background:transparent;font-family:'Fira Sans',system-ui;font-size:12px;font-weight:400;color:#78716C;cursor:pointer;transition:all 0.15s;}
.day-type-btn.active{font-weight:500;color:#fff;}

</style>
</head>

const SK_CDONE='ca_cdone_v1',SK_CLOGS='ca_clogs_v1',SK_FDONE='ca_fdone_v1',SK_FLOGS='ca_flogs_v1',SK_ACTS='ca_acts_v1';
const SYNC_URL = 'https://entrenament-prox.vercel.app/api/sync';
let _syncTimeout = null;
let _syncPending = false;

async function load(k){
  try{const r=await window.storage.get(k);return r&&r.value?JSON.parse(r.value):{}}
  catch(e){return{}}}

async function save(k,v){
  try{await window.storage.set(k,JSON.stringify(v))}catch(e){}
  // Sync diferit: espera 2s després de l'última escriptura per fer-ho d'un cop
  _syncPending=true;
  clearTimeout(_syncTimeout);
  _syncTimeout=setTimeout(pushToGitHub,2000);
}

async function pushToGitHub(){
  if(!_syncPending) return;
  _syncPending=false;
  try{
    const payload={
      cDone,cLogs,fDone,fLogs,
      acts:acts||[],
      adaptacio:adaptacioData||{}
    };
    await fetch(SYNC_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({data:payload})
    });
  }catch(e){console.warn('Sync error:',e);}
}

async function pullFromGitHub(){
  try{
    const res=await fetch(SYNC_URL);
    if(!res.ok) return false;
    const {data}=await res.json();
    if(!data) return false;
    // Fusionar: GitHub guanya si té més dades
    if(data.cDone&&Object.keys(data.cDone).length>=Object.keys(cDone).length) cDone=data.cDone;
    if(data.cLogs&&Object.keys(data.cLogs).length>=Object.keys(cLogs).length) cLogs=data.cLogs;
    if(data.fDone&&Object.keys(data.fDone).length>=Object.keys(fDone).length) fDone=data.fDone;
    if(data.fLogs&&Object.keys(data.fLogs).length>=Object.keys(fLogs).length) fLogs=data.fLogs;
    if(data.acts&&data.acts.length>=(acts||[]).length) acts=data.acts;
    if(data.adaptacio) adaptacioData=data.adaptacio;
    // Guardar localment
    await window.storage.set(SK_CDONE,JSON.stringify(cDone));
    await window.storage.set(SK_CLOGS,JSON.stringify(cLogs));
    await window.storage.set(SK_FDONE,JSON.stringify(fDone));
    await window.storage.set(SK_FLOGS,JSON.stringify(fLogs));
    await window.storage.set(SK_ACTS,JSON.stringify(acts));
    await window.storage.set(SK_ADAPTACIO,JSON.stringify(adaptacioData));
    return true;
  }catch(e){console.warn('Pull error:',e);return false;}
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2) return [];
  const headers=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
  return lines.slice(1).map(line=>{
    const vals=line.split(',').map(v=>v.replace(/"/g,'').trim());
    const obj={};
    headers.forEach((h,i)=>{obj[h]=vals[i]||'';});
    return obj;
  });
}

function normalizeActivity(row){
  const get=(...keys)=>{for(const k of keys){const v=row[k]||row[k.toLowerCase()]||'';if(v&&v!=='--'&&v!=='0.0'&&v!=='0')return v;}return '';};

  // ── DATA ──────────────────────────────────────────────────────────────────
  let dateRaw=get('Fecha de la actividad','date','activity date','start time','time');
  let date='';
  // Format Strava castellà: "27 jun 2026, 8:55:51"
  const MESOS_ES={'ene':'Jan','feb':'Feb','mar':'Mar','abr':'Apr','may':'May','jun':'Jun','jul':'Jul','ago':'Aug','sep':'Sep','oct':'Oct','nov':'Nov','dic':'Dec'};
  const mEs = dateRaw.match(/^(\d{1,2})\s+([a-zA-Z]+)\s+(\d{4})/);
  if(mEs){
    const mesEn = MESOS_ES[mEs[2].toLowerCase()]||mEs[2];
    try{ date = new Date(`${mEs[1]} ${mesEn} ${mEs[3]}`).toISOString().split('T')[0]; }catch(e){}
  }
  if(!date){
    const mIso = dateRaw.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(mIso) date=mIso[1]+'-'+mIso[2]+'-'+mIso[3];
    else{ const d=new Date(dateRaw); if(!isNaN(d)) date=d.toISOString().split('T')[0]; }
  }

  // ── DISTÀNCIA ─────────────────────────────────────────────────────────────
  let km=null;
  const distRaw = get('Distancia','distance','distance (km)','distance(km)');
  if(distRaw){
    let v=parseFloat(distRaw);
    if(!isNaN(v)&&v>0){
      if(v>500) km=v/1000;      // Strava en metres
      else if(v>0.1) km=v;      // ja en km
    }
  }
  if(km) km=Math.round(km*100)/100;

  // ── DESNIVELL ─────────────────────────────────────────────────────────────
  let dplus=null;
  const dpRaw=get('Desnivel positivo','elevation gain','elevation gain (m)','elevationup','total ascent');
  if(dpRaw){ const v=parseFloat(dpRaw); if(!isNaN(v)&&v>0) dplus=Math.round(v); }

  // ── FC ────────────────────────────────────────────────────────────────────
  let fcAvg=null, fcMax=null;
  const fcAvgRaw=get('Ritmo cardiaco promedio','average heart rate','avg hr','avg. heart rate');
  const fcMaxRaw=get('Ritmo cardiaco máximo','max. heart rate','max heart rate');
  if(fcAvgRaw){ const v=parseInt(parseFloat(fcAvgRaw)); if(!isNaN(v)&&v>40&&v<250) fcAvg=v; }
  if(fcMaxRaw){ const v=parseInt(parseFloat(fcMaxRaw)); if(!isNaN(v)&&v>40&&v<250) fcMax=v; }

  // ── RITME ─────────────────────────────────────────────────────────────────
  let pace='';
  // Strava dona velocitat en m/s — convertir a min/km
  const velRaw=get('Velocidad promedio','average speed');
  if(velRaw){
    const mps=parseFloat(velRaw);
    if(!isNaN(mps)&&mps>0.5&&mps<10){ // entre 1.8km/h i 36km/h — raonable per trail/bici
      const minPerKm=1000/(mps*60);
      if(minPerKm>2&&minPerKm<20) pace=Math.floor(minPerKm)+':'+String(Math.round((minPerKm%1)*60)).padStart(2,'0');
    }
  }
  if(!pace){
    const paceRaw=get('avg pace','average pace','avg. pace','pace');
    const pm=paceRaw.match(/(\d+):(\d+)/);
    if(pm) pace=pm[1]+':'+pm[2];
  }

  // ── TEMPS ─────────────────────────────────────────────────────────────────
  let temps=null;
  const tempsRaw=get('Tiempo en movimiento','Tiempo transcurrido','time','elapsed time','moving time','duration');
  if(tempsRaw){ const tv=parseFloat(tempsRaw); if(!isNaN(tv)&&tv>0) temps=Math.round(tv/60); }

  // ── NOM ───────────────────────────────────────────────────────────────────
  const nom=get('Nombre de la actividad','activity name','name','title')||'';

  // ── SPORT ─────────────────────────────────────────────────────────────────
  const typeRaw=(get('Tipo de actividad','Tipo','activity type','type','sport')||'').toLowerCase();
  let sport='trail';
  if(typeRaw.includes('biciclet')||typeRaw.includes('cycl')||typeRaw.includes('ride')||typeRaw.includes('virtual')) sport='bici';
  else if(typeRaw.includes('pesas')||typeRaw.includes('strength')||typeRaw.includes('weight')||typeRaw.includes('gym')||typeRaw.includes('entrenamiento con')) sport='forca';
  else if(typeRaw.includes('entrenamiento')||typeRaw.includes('crossfit')||typeRaw.includes('yoga')||typeRaw.includes('pilates')) sport='forca';
  else if(typeRaw.includes('fútbol')||typeRaw.includes('futbol')||typeRaw.includes('soccer')||typeRaw.includes('football')) sport='futbol';
  else if(typeRaw.includes('swim')||typeRaw.includes('nataci')) sport='natacio';
  else if(typeRaw.includes('caminat')||typeRaw.includes('walk')||typeRaw.includes('senderis')||typeRaw.includes('hik')) sport='senderisme';
  else if(typeRaw.includes('carrera')||typeRaw.includes('run')||typeRaw.includes('trail')) sport='trail';

  return{date,km,dplus,fcAvg,fcMax,pace,temps,nom,sport};
}

  const matches={};
  activities.forEach(act=>{
    if(!act.date)return;
    PLA_CARDIO.forEach(week=>{
      Object.entries(week.sessions).forEach(([slot,sess])=>{
        const diff=Math.abs(new Date(act.date+'T00:00:00')-new Date(sess.date+'T00:00:00'))/86400000;
        const sportMatch=act.sport===(sess.sport||'trail');
        if(diff<=1&&sportMatch){
          const key=sKeyC(week.week,slot);
          if(!matches[key]||Math.abs((act.km||0)-sess.km)<Math.abs((matches[key].km||0)-sess.km))

        }
      });
    });
  });
  return matches;

      const rows=parseCSV(ev.target.result);
      const activities=rows.map(normalizeActivity).filter(a=>a.date&&(a.km||a.fcAvg||a.temps));

      // 1. Guardar TOTES les activitats al registre general
      const existing = new Set(acts.map(a=>a.date+'_'+a.sport+'_'+(a.km||0)));
      let newActs = 0;
      activities.forEach(act=>{
        const key = act.date+'_'+act.sport+'_'+(act.km||0);
        if(!existing.has(key)){
          acts.push({
            date: act.date,
            sport: act.sport,
            km: act.km,
            dplus: act.dplus,
            fcAvg: act.fcAvg,
            fcMax: act.fcMax,
            pace: act.pace,
            temps: act.temps,
            nom: act.nom||'',
          });
          newActs++;
        }
      });
      // Ordenar per data desc
      acts.sort((a,b)=>b.date.localeCompare(a.date));
      save(SK_ACTS, acts);

      // 2. Associar al pla (com abans)
      const matches=matchActivitiesToSessions(activities);
      const count=Object.keys(matches).length;
      Object.entries(matches).forEach(([k,act])=>{
        if(!cLogs[k])cLogs[k]={};
        Object.entries(act).forEach(([f,v])=>{if(v!==null&&v!=='')cLogs[k][f]=v;});
        if(act.km)cDone[k]=true;
      });
      save(SK_CLOGS,cLogs); save(SK_CDONE,cDone);

      const s=newActs===1?'':'s';
      csvImportMsg={ok:true,text:`${newActs} activitat${s} nova${s} importada${s}. ${count} associada${count===1?'':'s'} al pla.`};
    }catch(e){csvImportMsg={ok:false,text:'Error llegint el fitxer. Assegura\'t que és un CSV de Garmin Connect o Strava.'};}
    input.value=''; renderAll();
  };
  reader.readAsText(file);
}

// ── INDICADOR DE PREPARACIÓ FÍSICA ─────────────────────────────────────────
function calcFitness(){
  // Km màxim real de sortida llarga trail (pes 40%, obj 21km)
  let maxKmReal=0;
  PLA_CARDIO.forEach(w=>{
    const slot=w.sessions.race?'race':'sat';
    const s=w.sessions[slot];
    if(!s||s.sport!=='trail')return;
    const log=cLogs[sKeyC(w.week,slot)];
    if(log&&log.km)maxKmReal=Math.max(maxKmReal,parseFloat(log.km));
  });
  // D+ màxim real (pes 40%, obj 1100m)
  let maxDpReal=0;
  PLA_CARDIO.forEach(w=>{
    const slot=w.sessions.race?'race':'sat';
    const s=w.sessions[slot];
    if(!s||s.sport!=='trail')return;
    const log=cLogs[sKeyC(w.week,slot)];
    if(log&&log.dplus)maxDpReal=Math.max(maxDpReal,parseInt(log.dplus));
  });
  // Km bici acumulats reals (pes 20%, obj 500km)
  let kmBiciAcc=0;
  PLA_CARDIO.forEach(w=>{
    Object.entries(w.sessions).forEach(([slot,s])=>{
      if(s.sport!=='bici')return;
      const log=cLogs[sKeyC(w.week,slot)];
      if(log&&log.km)kmBiciAcc+=parseFloat(log.km);
    });
  });
  const pKm = Math.min(100, Math.round(maxKmReal/21*100));
  const pDp = Math.min(100, Math.round(maxDpReal/1100*100));
  const pBici= Math.min(100, Math.round(kmBiciAcc/500*100));
  const total= Math.round(pKm*0.4 + pDp*0.4 + pBici*0.2);
  return{total,pKm,pDp,pBici,maxKmReal,maxDpReal,kmBiciAcc};
}

function chartBlock(title,col,colLight,items,targetVal,unitLabel){
  if(!items.length) return '';
  const maxV=Math.max(...items.map(h=>Math.max(h.planned,h.real||0)),targetVal||1);
  let s=`<div class="progres-card"><div class="progres-header">
    <div style="width:3px;height:14px;background:${col};border-radius:2px"></div>
    <span style="font-size:13px;font-weight:500">${title}</span>
    ${targetVal?`<span style="font-size:11px;font-weight:300;color:#78716C;margin-left:auto">Obj: ${targetVal} ${unitLabel}</span>`:''}
  </div><div class="chart-wrap">`;
  items.slice(-12).forEach(h=>{
    const pP=Math.round(h.planned/maxV*100);
    const pR=h.real?Math.round(h.real/maxV*100):0;
    s+=`<div class="chart-col">

      <span style="font-size:8px;font-weight:500;color:${h.real?col:'#C8C2BB'}">${h.real||h.planned}</span>
    </div>`;
  });
  s+=`</div><div class="chart-legend">
    <div class="chart-legend-item"><div class="chart-legend-dot" style="background:${colLight}"></div><span style="font-size:10px;font-weight:300;color:#78716C">previst</span></div>
    <div class="chart-legend-item"><div class="chart-legend-dot" style="background:${col}"></div><span style="font-size:10px;font-weight:300;color:#78716C">real</span></div>

  return s;
}

    const pctKm = maxKmReal>0 ? Math.round(maxKmReal/OBJ_KM*100) : 0;
    html+=bigCard('📏','Distància màxima',maxKmReal>0?maxKmReal.toFixed(1):0,'km',pctKm,'#2D5016',
      maxKmReal>0?`Objectiu: ${OBJ_KM} km · Falten ${Math.max(0,(OBJ_KM-maxKmReal)).toFixed(1)} km`:'Registra la teva primera sortida',
      maxKmReal>=15?'💡 Ja superes el 70% de la distància de cursa. Bon moment per treballar el ritme.':
      maxKmReal>=10?'💡 Bona base. Incrementa 1-2 km cada dues setmanes.':
      maxKmReal>0?'💡 Fase inicial. Construeix la base aeròbica progressivament.':null);

    // 2. D+ màxim
    const pctDp = maxDpReal>0 ? Math.round(maxDpReal/OBJ_DP*100) : 0;
    html+=bigCard('⛰️','Desnivell màxim',maxDpReal>0?maxDpReal:0,'m D+',pctDp,'#2D5016',
      maxDpReal>0?`Objectiu: ${OBJ_DP} m · Falten ${Math.max(0,OBJ_DP-maxDpReal)} m`:'Registra sortides amb desnivell',
      maxDpReal>=700?'💡 Ja aguantes un desnivell significatiu. Treballa la tècnica de pujada.':
      maxDpReal>=300?'💡 Bon progrés. Busca rutes amb més pujada progressivament.':
      maxDpReal>0?'💡 Comença amb pujades suaus i allarga-les cada setmana.':null);

    // 3. Temps en moviment màxim
    const pctTemps = maxTempsReal>0 ? Math.round(maxTempsReal/OBJ_TEMPS*100) : 0;
    const tempsStr = maxTempsReal>0 ? `${Math.floor(maxTempsReal/60)}h${String(maxTempsReal%60).padStart(2,'0')}min` : 0;
    html+=bigCard('⏱️','Temps màxim en moviment',tempsStr,'',pctTemps,'#1D4ED8',
      maxTempsReal>0?`Objectiu: ${Math.floor(OBJ_TEMPS/60)}h${OBJ_TEMPS%60}min estimat · Falten ${Math.max(0,OBJ_TEMPS-maxTempsReal)} min`:'Registra el temps de les teves sortides',
      maxTempsReal>=120?'💡 Ja aguantes més de 2h. El cos s\'adapta bé a l\'esforç prolongat.':
      maxTempsReal>=60?'💡 Una hora és la base. Allarga 10-15 min cada setmana.':
      maxTempsReal>0?'💡 Construeix la resistència temporal progressivament.':null);

    // 4. FC Z2
    const pctFc = fcZ2Recent ? Math.max(0, Math.round((170-fcZ2Recent)/(170-OBJ_FC_Z2)*100)) : 0;
    const fcExtra = fcZ2Millora && fcZ2Millora>0 ?
      `💡 La teva FC Z2 ha baixat ${fcZ2Millora} bpm des de l'inici — el teu cor és cada cop més eficient.` :
      fcZ2Recent ? `💡 Continua entrenant en Z2. La FC baixarà amb les setmanes.` : null;
    html+=bigCard('❤️','FC mitja en Z2',fcZ2Recent||0,'bpm',pctFc,'#B91C1C',
      fcZ2Recent?`Objectiu: ≤${OBJ_FC_Z2} bpm · ${fcZ2Inici&&fcZ2Inici!==fcZ2Recent?`Inici: ${fcZ2Inici} bpm`:'Primeres dades registrades'}`:'Registra la FC de les teves sortides Z2',
      fcExtra);

  } else {
    // ESTADÍSTIQUES CARDIO
    const totalKmTrail=PLA_CARDIO.reduce((a,w)=>a+Object.values(w.sessions).filter(s=>s.sport==='trail').reduce((b,s)=>b+s.km,0),0);
    const totalKmBici=PLA_CARDIO.reduce((a,w)=>a+Object.values(w.sessions).filter(s=>s.sport==='bici').reduce((b,s)=>b+s.km,0),0);
    const doneSessN=Object.values(cDone).filter(Boolean).length;
    const daysLeft=Math.max(0,Math.ceil((new Date('2027-04-20T00:00:00')-new Date())/86400000));
    const f=calcFitness();
    const stats=[
      {l:'Sessions fetes',v:doneSessN,u:'/ '+totalSess},
      {l:'Progrés',v:Math.round(doneSessN/totalSess*100)+'%',u:''},
      {l:'Km trail del pla',v:Math.round(totalKmTrail),u:'km'},
      {l:'Km bici del pla',v:Math.round(totalKmBici),u:'km'},
      {l:'Dies per la cursa',v:daysLeft,u:'dies'},
      {l:'Objectiu',v:'21 km',u:'D+1100m'},
    ];
    html+=`<div class="stats-grid">${stats.map(s=>`<div class="stat-card"><div class="stat-val">${s.v}${s.u?`<span class="stat-unit">${s.u}</span>`:''}</div><div class="stat-label">${s.l}</div></div>`).join('')}</div>`;

    // Indicador de preparació física
    const fitnessCol=f.total<30?'#B45309':f.total<60?'#1D4ED8':'#2D5016';
    const fitnessBg=f.total<30?'linear-gradient(90deg,#B45309,#D97706)':f.total<60?'linear-gradient(90deg,#1D4ED8,#3B82F6)':'linear-gradient(90deg,#2D5016,#4A8A2A)';
    const fitnessMsg=f.total===0?'Importa dades de Garmin o registra km reals per veure la teva preparació física.':f.total<30?'Fase inicial. Continua acumulant km i D+.':f.total<60?'Bon progrés. Segueix construint el desnivell.':f.total<85?'Molt bona forma. Ja pots acabar la Vilatrail.':'Excel·lent preparació. Estàs a punt.';
    html+=`<div class="section-card" style="margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;">
        <div class="section-title" style="margin-bottom:0">Preparació física per a la Vilatrail</div>
        <span style="font-size:22px;font-weight:600;color:${fitnessCol};letter-spacing:-1px">${f.total}%</span>
      </div>
      <div style="height:6px;background:#E5E1DC;border-radius:3px;margin-bottom:8px;">
        <div style="height:100%;border-radius:3px;background:${fitnessBg};width:${f.total}%;transition:width 0.6s ease;"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px;">
        ${[
          {l:'Trail llarg',v:f.maxKmReal>0?f.maxKmReal.toFixed(1)+' km':'—',p:f.pKm,obj:'/ 21 km'},
          {l:'D+ màxim',v:f.maxDpReal>0?f.maxDpReal+' m':'—',p:f.pDp,obj:'/ 1100 m'},
          {l:'Bici acum.',v:f.kmBiciAcc>0?Math.round(f.kmBiciAcc)+' km':'—',p:f.pBici,obj:'/ 500 km'},
        ].map(i=>`<div style="padding:8px 10px;border-radius:8px;background:#F7F5F2;border:1px solid #E5E1DC;">
          <div style="font-size:16px;font-weight:600;color:#1C1917">${i.v}</div>
          <div style="font-size:10px;font-weight:300;color:#78716C">${i.l} <span style="color:#A8A29E">${i.obj}</span></div>
          <div style="height:2px;background:#E5E1DC;border-radius:1px;margin-top:4px;"><div style="height:100%;background:${fitnessCol};width:${i.p}%;border-radius:1px;"></div></div>
        </div>`).join('')}
      </div>
      <div style="font-size:11px;font-weight:300;color:#78716C;font-style:italic">${fitnessMsg}</div>
    </div>`;

    // Botó importació CSV
    html+=`<div class="section-card" style="margin-bottom:12px;">
      <div class="section-title">Importar activitats de Garmin / Strava</div>
      <div style="font-size:11px;font-weight:300;color:#78716C;margin-bottom:10px;line-height:1.6;">
        Exporta el CSV d'activitats de Garmin Connect (Activitats → Exportar CSV) o de Strava (Configuració → Descarrega les teves dades → activities.csv). El parser detecta automàticament trail (Run) i bici (Ride) i associa les dades per data.
      </div>
      <label style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:1.5px dashed #C8C2BB;border-radius:8px;cursor:pointer;background:#FAFAF8;font-family:'Fira Sans',system-ui;font-size:13px;font-weight:400;color:#78716C;">
        &#8593; Selecciona un fitxer CSV
        <input type="file" accept=".csv" onchange="handleCSVImport(this)" style="display:none;">
      </label>
      ${csvImportMsg?`<div style="margin-top:8px;padding:8px 12px;border-radius:6px;font-size:12px;font-weight:300;line-height:1.6;background:${csvImportMsg.ok?'#EEF3E8':'#FEF2F2'};color:${csvImportMsg.ok?'#2D5016':'#B91C1C'};border:1px solid ${csvImportMsg.ok?'#D1E8C4':'#FECACA'};">${csvImportMsg.text}</div>`:''}
    </div>`;

    // Botó IA
    html+=`<div class="section-card" style="margin-bottom:12px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${iaResult||iaLoading?'12px':'0'}">
        <div>
          <div class="section-title" style="margin-bottom:2px;">Anàlisi IA del progrés</div>
          <div style="font-size:11px;font-weight:300;color:#78716C;">Claude analitza les teves dades reals i et dona feedback personalitzat</div>
        </div>
        <button onclick="analyzeWithAI()" style="font-family:'Fira Sans',system-ui;font-size:12px;font-weight:500;padding:8px 14px;border-radius:8px;border:1px solid #2D5016;background:${iaLoading?'#EEF3E8':'#2D5016'};color:${iaLoading?'#2D5016':'#fff'};cursor:${iaLoading?'default':'pointer'};white-space:nowrap;flex-shrink:0;margin-left:12px;">
          ${iaLoading?'Analitzant...':'Analitza el meu progrés'}
        </button>
      </div>
      ${iaLoading?`<div style="display:flex;align-items:center;gap:8px;padding:12px;background:#F7F5F2;border-radius:8px;">
        <div style="width:16px;height:16px;border:2px solid #2D5016;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0"></div>
        <span style="font-size:12px;font-weight:300;color:#78716C;">Claude llegint el teu historial d'entrenaments...</span>
      </div>`:''}
      ${iaResult?`<div style="font-size:13px;font-weight:300;color:#1C1917;line-height:1.75;white-space:pre-wrap;background:#F7F5F2;padding:14px;border-radius:8px;border:1px solid #E5E1DC;">${iaResult}</div>`:''}
    </div>`;

    html+=`<div class="section-card"><div class="section-title">Desnivell màxim trail per fase</div>`;    [1,2,3,4].forEach(ph=>{
      const phW=PLA_CARDIO.filter(w=>w.phase===ph);
      const maxDp=Math.max(...phW.map(w=>Math.max(...Object.values(w.sessions).map(s=>s.dplus||0))));
      const pct=Math.round(maxDp/1100*100);
      html+=`<div class="phase-bar-row"><div class="phase-bar-header"><span style="font-size:12px;font-weight:300;color:#78716C">${PHASE_LABEL[ph]}</span><span style="font-size:12px">D+${maxDp} m</span></div><div class="phase-bar-bg"><div class="phase-bar-fill" style="width:${pct}%;background:${PHASE_COLOR[ph]}"></div></div></div>`;
    });
    html+=`</div>`;
  }

  el.innerHTML=html;
}

function setCView(v){cView=v;renderCardio();}
function navC(d){cWeek=Math.max(0,Math.min(PLA_CARDIO.length-1,cWeek+d));renderCardio();}
function toggleCDone(key){cDone[key]=!cDone[key];save(SK_CDONE,cDone);renderCardio();}

// ── FORÇA ──────────────────────────────────────────────────────────────────
function renderForca(){
  const el=document.getElementById('tab-forca');
  const today=todayISO();
  const w=PLA_FORCA[fWeek];
  const isCur=fWeek===findCurWeek(PLA_FORCA);
  const totalSess=PLA_FORCA.length*3;
  const doneSess=Object.values(fDone).filter(Boolean).length;

  let html=progressBar(doneSess,totalSess,'#2D5016');
  html+=subTabs([['setmana','Setmana'],['overview','Visió general'],['progres','Progressió'],['stats','Estadístiques']],''+fView,'setFView');

  if(fView==='setmana'){
    html+=`<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px;flex-wrap:wrap;">
      <div class="week-title">Setmana ${w.week} <span style="font-size:12px;font-weight:300;color:#78716C">/ 43</span>
        ${isCur?'<span class="badge badge-green">ara</span>':''}
        ${w.is_recovery?'<span class="badge badge-amber">recuperació</span>':''}
        ${w.is_heavy_trail?'<span class="badge badge-orange">trail pesat</span>':''}
      </div>
    </div>`;
    html+=`<div class="week-sub" style="margin-bottom:10px"><span>${fmtDate(w.start_date)}</span><span style="color:${BLOC_COLOR[w.bloc]}">${BLOC_LABEL[w.bloc]}</span></div>`;
    html+=`<div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="week-nav-btn" onclick="navF(-1)" ${fWeek===0?'disabled':''}>&larr;</button>
      <button class="week-nav-btn" onclick="navF(1)" ${fWeek===PLA_FORCA.length-1?'disabled':''}>&rarr;</button>
      ${!isCur?`<button style="font-family:'Fira Sans',system-ui;font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid #E5E1DC;background:transparent;color:#78716C;" onclick="fWeek=findCurWeek(PLA_FORCA);renderForca()">Avui</button>`:''}
    </div>`;

    if(w.is_heavy_trail) html+=`<div class="alert alert-orange">Tirada llarga de trail amb D+ elevat. Legs amb volum reduït i RIR +1.</div>`;

    const days=Object.entries(w.sessions);
    html+='<div class="sessions-bloc">';
    days.forEach(([day,sess],idx)=>{
      const key=sKeyF(w.week,day);
      const isDone=fDone[key];
      const isToday=sess.date===today;
      const isPast=sess.date<today&&!isToday;
      const meta=TIPUS_META[sess.tipus];
      const isOpen=openForcaDay===key;
      const logDay=fLogs[key]||{};
      const hasKg=Object.keys(logDay).some(k=>logDay[k]&&logDay[k].kg);
      const br=idx===0?'10px 10px 0 0':idx===days.length-1?'0 0 10px 10px':'0';
      const doneCls=isDone?`done-${meta.cls}`:'';
      const op=isPast&&!isDone?'opacity:0.55;':'';

      html+=`<div class="session-card ${doneCls} ${isToday?'today':''}" style="border-radius:${br}${idx>0?';border-top:none':''}">
        <div class="session-row" style="${op}">
          <div class="session-day"><div class="session-day-label ${isToday?'today':''}">${DAY_LABEL_F[day]}</div><div class="session-day-date">${fmtDate(sess.date)}</div></div>
          <div class="session-body">
            <div class="session-name">
              <span style="color:${isDone?meta.col:'#1C1917'}">${meta.emoji} ${meta.label}</span>
              <span style="font-size:11px;font-weight:300;color:#78716C">${{push:'Pit · Espatlles · Tríceps',legs:'Quads · Glutis · Isquios',pull:'Esquena · Bíceps'}[sess.tipus]}</span>
            </div>
            <div class="session-meta">
              <span>${sess.exercicis.length} exercicis</span>
              ${renderRir(sess.exercicis[0].rir)}
              ${hasKg?`<span style="font-size:10px;font-weight:500;color:${meta.col};background:${meta.col}18;border:1px solid ${meta.col}40;padding:1px 6px;border-radius:20px;">Pes registrat</span>`:''}
            </div>
          </div>
          <div class="session-actions">
            <button class="btn-small" style="${isOpen?`border-color:${meta.col};background:${meta.col}18;color:${meta.col}`:''}" onclick="toggleForcaDay('${key}')">${isOpen?'Tancar':'Veure'}</button>
            <button class="btn-done ${isDone?`done-${meta.cls}`:''}" onclick="toggleFDone('${key}')">${isDone?'&#10003;':'Fet'}</button>
          </div>
        </div>`;

      if(isOpen){
        html+=`<div class="exercici-bloc">`;
        sess.exercicis.forEach((ex,ei)=>{
          const exLog=(fLogs[key]||{})[ex.id]||{};
          html+=`<div class="exercici-row" style="${ei%2===1?'background:rgba(0,0,0,0.01)':''}">
            ${ex.principal?`<div style="width:3px;height:12px;background:${meta.col};border-radius:2px;flex-shrink:0"></div>`:'<div style="width:3px;flex-shrink:0"></div>'}
            <div class="exercici-info">
              <div class="exercici-nom ${ex.principal?'principal':''}">${ex.nom}</div>
              <div class="exercici-muscles">${ex.muscles}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
              <span class="exercici-series">${ex.series}x${ex.reps}</span>
              ${renderRir(ex.rir)}
              ${exLog.kg?`<span style="font-size:11px;font-weight:500;color:${meta.col}">${exLog.kg} kg</span>`:''}
            </div>
            <input type="number" placeholder="kg" value="${exLog.kg||''}" class="kg-input"
              style="${exLog.kg?`border-color:${meta.col}40`:''}"
              onchange="saveExKg('${key}','${ex.id}',this.value)">
          </div>`;
        });
        html+=`</div>`;
      }
      html+=moodRpeHtml(key, logDay, meta.col, true);
      html+=`</div>`;
    });
    html+='</div>';
    html+=`<div class="session-dots">${days.map(([day,sess])=>{const isDone=fDone[sKeyF(w.week,day)];const meta=TIPUS_META[sess.tipus];return `<div class="dot" style="background:${isDone?meta.col:'#E5E1DC'}"></div>`;}).join('')}</div>`;

  } else if(fView==='overview'){
    [1,2,3,4].forEach(bloc=>{
      const bW=PLA_FORCA.filter(w=>w.bloc===bloc);
      const col=BLOC_COLOR[bloc];
      html+=`<div class="overview-bloc"><div class="overview-header"><div class="overview-bar" style="background:${col}"></div><span class="overview-title">Bloc ${bloc}: ${BLOC_LABEL[bloc]}</span><span class="overview-count">${bW.length} setmanes</span></div><div class="overview-rows" style="border:1px solid #E5E1DC;border-radius:8px;overflow:hidden;">`;
      bW.forEach((w,idx)=>{
        const wi=PLA_FORCA.indexOf(w);
        const isCur=wi===findCurWeek(PLA_FORCA);
        const isPast=w.start_date<today&&!isCur;
        const days=Object.entries(w.sessions);
        html+=`<div class="overview-row ${isCur?'current':''}" style="border-top:${idx>0?'1px solid #E5E1DC':'none'};" onclick="fWeek=${wi};fView='setmana';renderForca()">
          <span style="font-size:11px;font-weight:300;color:#78716C;min-width:28px">${w.week}</span>
          <span style="font-size:12px;font-weight:${isCur?500:400};color:${isCur?'#1C1917':isPast?'#78716C':'#1C1917'}">${fmtDate(w.start_date)}</span>
          ${isCur?'<span class="badge badge-green" style="margin-left:4px">ara</span>':''}
          ${w.is_recovery?'<span style="font-size:10px;color:#92400E;margin-left:4px">&darr;</span>':''}
          ${w.is_heavy_trail?'<span style="font-size:10px;color:#B45309;margin-left:2px">&#9650;</span>':''}
          <div style="display:flex;gap:3px;margin-left:auto">${days.map(([day,sess])=>{const isDone=fDone[sKeyF(w.week,day)];const meta=TIPUS_META[sess.tipus];return `<div class="mini-dot" style="background:${isDone?meta.col:'#E5E1DC'}"></div>`;}).join('')}</div>
          <span style="font-size:10px;color:#78716C;margin-left:8px">&rarr;</span>
        </div>`;
      });
      html+='</div></div>';
    });

  } else if(fView==='progres'){
    const principals=[
      {id:'p1',nom:'Press de banca',tipus:'push',day:'mon'},
      {id:'p3',nom:'Press militar',tipus:'push',day:'mon'},
      {id:'l1',nom:'Sentadilla',tipus:'legs',day:'wed'},
      {id:'l2',nom:'Hip thrust',tipus:'legs',day:'wed'},
      {id:'r1',nom:'Dominades',tipus:'pull',day:'thu'},
      {id:'r2',nom:'Rem en barra',tipus:'pull',day:'thu'},
    ];
    html+=`<div style="font-size:12px;font-weight:300;color:#78716C;margin-bottom:16px;line-height:1.6;">Historial de càrregues dels exercicis principals.</div>`;
    principals.forEach(ex=>{
      const meta=TIPUS_META[ex.tipus];
      const history=PLA_FORCA.map(w=>{const k=sKeyF(w.week,ex.day);const l=(fLogs[k]||{})[ex.id];return l&&l.kg?{week:w.week,kg:parseFloat(l.kg)}:null;}).filter(Boolean);
      const lastKg=history.length?history[history.length-1].kg:null;
      const maxKg=history.length?Math.max(...history.map(h=>h.kg)):0;
      html+=`<div class="progres-card"><div class="progres-header"><div style="width:3px;height:14px;background:${meta.col};border-radius:2px"></div><span style="font-size:13px;font-weight:500">${ex.nom}</span><span style="font-size:11px;font-weight:300;color:#78716C;margin-left:auto">${lastKg?lastKg+' kg':'Sense dades'}</span></div>`;
      if(history.length>1){
        html+=`<div class="mini-bars">`;
        history.slice(-8).forEach((h,i)=>{
          const pct=Math.round(h.kg/maxKg*100);
          const op=(0.5+i/history.length*0.5).toFixed(2);
          html+=`<div class="mini-bar-wrap"><div class="mini-bar-bg"><div class="mini-bar-fill" style="height:${pct}%;background:${meta.col};opacity:${op}"></div></div><span class="mini-bar-s">S${h.week}</span><span class="mini-bar-kg">${h.kg}</span></div>`;
        });
        html+=`</div>`;
      } else {
        html+=`<div style="font-size:11px;font-weight:300;color:#78716C">Introdueix el pes a la vista de setmana per veure la progressió.</div>`;
      }
      html+=`</div>`;
    });

  } else {
    // ESTADÍSTIQUES FORÇA
    const doneSessN=Object.values(fDone).filter(Boolean).length;
    const stats=[
      {l:'Sessions fetes',v:doneSessN,u:'/ '+totalSess},
      {l:'Progrés',v:Math.round(doneSessN/totalSess*100)+'%',u:''},
      {l:'Sessions Push',v:PLA_FORCA.length,u:''},
      {l:'Sessions Legs',v:PLA_FORCA.length,u:''},
      {l:'Sessions Pull',v:PLA_FORCA.length,u:''},
      {l:'Setmanes totals',v:43,u:''},
    ];
    html+=`<div class="stats-grid">${stats.map(s=>`<div class="stat-card"><div class="stat-val">${s.v}${s.u?`<span class="stat-unit">${s.u}</span>`:''}</div><div class="stat-label">${s.l}</div></div>`).join('')}</div>`;
    html+=`<div class="section-card"><div class="section-title">Blocs de progressió</div>`;
    [1,2,3,4].forEach(b=>{
      const bW=PLA_FORCA.filter(w=>w.bloc===b);
      const done=bW.reduce((a,w)=>a+Object.entries(w.sessions).filter(([d])=>fDone[sKeyF(w.week,d)]).length,0);
      const tot=bW.length*3;
      const pct=Math.round(done/tot*100);
      html+=`<div class="phase-bar-row"><div class="phase-bar-header"><span style="font-size:12px;font-weight:300;color:#78716C">Bloc ${b}: ${BLOC_LABEL[b]}</span><span style="font-size:12px">${done}/${tot}</span></div><div class="phase-bar-bg"><div class="phase-bar-fill" style="width:${pct}%;background:${BLOC_COLOR[b]}"></div></div></div>`;
    });
    html+=`</div>`;
  }

  el.innerHTML=html;
}

  const sessions = [];

          planKm: s.km,
          planDp: s.dplus,
          realKm: log.km||null,
          realDp: log.dplus||null,

          rpe: log.rpe!==null&&log.rpe!==undefined?log.rpe:null,

        });
      }
    });
  });

  const f = calcFitness();

  const prompt = `Ets un entrenador personal expert en trail running i ciclisme. Analitza el progrés d'en Gerard Abril Pujadas cap a la Vilatrail 2027 (21km / D+1100m, 20 abril 2027).

DADES DEL PLA:
- Pla de 43 setmanes (juny 2026 - abril 2027)
- 3 sessions cardio/setmana: dimarts trail, divendres bici, dissabte/diumenge tirada llarga
- 3 sessions força/setmana: Push (dll), Legs (dx), Pull (dj)

PROGRÉS ACTUAL:
- Sessions completades: ${doneSess} de ${totalSess} (${Math.round(doneSess/totalSess*100)}%)
- Preparació física estimada: ${f.total}% (km trail màx: ${f.maxKmReal}km / obj 21km, D+ màx: ${f.maxDpReal}m / obj 1100m, bici acumulada: ${Math.round(f.kmBiciAcc)}km / obj 500km)

SESSIONS AMB DADES REALS:
${JSON.stringify(sessions, null, 0)}

Fes una anàlisi concisa en català (4-6 paràgrafs) amb:
1. Valoració general del progrés
2. Punts forts observats
3. Àrees de millora o alertes
4. Recomanacions concretes per les properes 2-3 setmanes
5. Pronòstic per a la Vilatrail

Sigues directe, específic i pràctic. Usa els números reals. No siguis excessivament optimista si les dades no ho justifiquen.`;

  try {
    const response = await fetch('https://entrenament-prox.vercel.app/api/analyze', {
      method: 'POST',

    const data = await response.json();

const SK_ADAPTACIO = 'ca_adaptacio_v1';
let adaptacioData = {}; // {offset: N, weekOverrides: {wn: {skip, repeat}}, proposals: [...], dismissed: [...]}

async function loadAdaptacio(){
  try{
    const r = await window.storage.get(SK_ADAPTACIO);
    if(r&&r.value) adaptacioData = JSON.parse(r.value);
    else adaptacioData = {offset:0, weekOverrides:{}, proposals:[], dismissed:[]};
  } catch(e){ adaptacioData = {offset:0, weekOverrides:{}, proposals:[], dismissed:[]}; }
}

async function saveAdaptacio(){
  await window.storage.set(SK_ADAPTACIO, JSON.stringify(adaptacioData));
}

// Calcula la setmana efectiva tenint en compte l'offset d'adaptació
function getEffectiveWeekIdx(nominalIdx){
  return Math.min(PLA_CARDIO.length-1, nominalIdx + (adaptacioData.offset||0));
}

// Analitza la setmana acabada i genera propostes d'adaptació
function analyzeWeekAdaptation(weekIdx){
  const w = PLA_CARDIO[weekIdx];
  if(!w) return null;

  const ss = Object.entries(w.sessions);
  const today = todayISO();

  // Calcular volum planificat vs real
  let plannedKm = 0, realKm = 0, sessionsPlanned = 0, sessionsDone = 0;
  let avgRpe = 0, rpeCount = 0;
  let missedSessions = [];

  ss.forEach(([slot, s]) => {
    if(s.date >= today) return; // Només sessions passades
    const key = sKeyC(w.week, slot);
    const log = cLogs[key]||{};
    const done = cDone[key];
    if(s.type === 'descans_actiu') return;

    sessionsPlanned++;
    plannedKm += s.km || 0;

    if(done){
      sessionsDone++;
      if(log.km) realKm += parseFloat(log.km);
      else realKm += s.km; // Si no té dades, assumim planificat
    } else {
      missedSessions.push(TYPE_LABEL[s.type]||s.type);
    }

    if(log.rpe){ avgRpe += log.rpe; rpeCount++; }
  });

  if(sessionsPlanned === 0) return null;

  const completionPct = Math.round(sessionsDone/sessionsPlanned*100);
  const volumePct = plannedKm > 0 ? Math.round(realKm/plannedKm*100) : 100;
  avgRpe = rpeCount > 0 ? Math.round(avgRpe/rpeCount*10)/10 : null;

  const proposals = [];

  // Regla 1: menys del 70% del volum → repetir setmana
  if(volumePct < 70 && sessionsPlanned >= 2){
    proposals.push({
      type: 'repeat_week',
      severity: 'warning',
      title: 'Repetir la setmana ' + w.week,
      reason: `Has completat el ${volumePct}% del volum planificat (${realKm.toFixed(1)}km de ${plannedKm.toFixed(1)}km). El cos no ha rebut l'estímul suficient per progressar.`,
      action: `Repetir la setmana ${w.week} abans de passar a la ${w.week+1}. El pla s'endarrerirà 1 setmana.`,
      weekIdx: weekIdx,
    });
  }

  // Regla 2: menys del 50% sessions fetes → alerta forta
  if(completionPct < 50 && sessionsPlanned >= 2){
    proposals.push({
      type: 'low_completion',
      severity: 'danger',
      title: 'Baixa adherència a la setmana ' + w.week,
      reason: `Només has fet ${sessionsDone} de ${sessionsPlanned} sessions (${completionPct}%). Sessions saltades: ${missedSessions.join(', ')}.`,
      action: 'Considera recuperar alguna sessió aquesta setmana o parlar amb el teu entrenador si hi ha causa física.',
      weekIdx: weekIdx,
    });
  }

  // Regla 3: RPE sistemàticament alt → recuperació extra
  if(avgRpe !== null && avgRpe >= 8.5){
    proposals.push({
      type: 'high_rpe',
      severity: 'warning',
      title: 'Fatiga elevada detectada',
      reason: `L'RPE mig de la setmana ${w.week} ha estat ${avgRpe}/10. Això indica fatiga acumulada important.`,
      action: 'Reduir el volum de la propera setmana un 20% i prioritzar el son i la recuperació.',
      weekIdx: weekIdx,
    });
  }

  // Regla 4: tot perfecte → reforç positiu
  if(completionPct >= 95 && volumePct >= 90 && (avgRpe === null || avgRpe <= 7)){
    proposals.push({
      type: 'on_track',
      severity: 'success',
      title: 'Setmana ' + w.week + ' completada perfectament',
      reason: `Has fet el ${completionPct}% de les sessions i el ${volumePct}% del volum planificat${avgRpe?` amb RPE mig de ${avgRpe}`:''}. El pla progressa segons el previst.`,
      action: null,
      weekIdx: weekIdx,
    });
  }

  return {weekIdx, completionPct, volumePct, avgRpe, proposals};
}

// Genera propostes per totes les setmanes passades no analitzades
function checkAllWeeksForAdaptation(){
  const today = todayISO();
  const curIdx = findCurWeek(PLA_CARDIO);
  const newProposals = [];

  // Analitzar les últimes 3 setmanes passades
  for(let i = Math.max(0, curIdx-3); i < curIdx; i++){
    const w = PLA_CARDIO[i];
    if(!w) continue;
    // Verificar si ja hem analitzat aquesta setmana
    const alreadyAnalyzed = (adaptacioData.proposals||[]).some(p=>p.weekIdx===i) ||
                            (adaptacioData.dismissed||[]).includes(i);
    if(alreadyAnalyzed) continue;

    const result = analyzeWeekAdaptation(i);
    if(result && result.proposals.length > 0){
      result.proposals.forEach(p => newProposals.push(p));
    }
  }

  if(newProposals.length > 0){
    adaptacioData.proposals = [...(adaptacioData.proposals||[]), ...newProposals];
    saveAdaptacio();
  }

  return newProposals;
}

function applyAdaptation(proposal){
  if(proposal.type === 'repeat_week'){
    adaptacioData.offset = (adaptacioData.offset||0) + 1;
  }
  // Eliminar la proposta de la llista
  adaptacioData.proposals = (adaptacioData.proposals||[]).filter(p=>
    !(p.type===proposal.type && p.weekIdx===proposal.weekIdx)
  );
  saveAdaptacio();
  renderAll();
}

function dismissAdaptation(proposal){
  adaptacioData.proposals = (adaptacioData.proposals||[]).filter(p=>
    !(p.type===proposal.type && p.weekIdx===proposal.weekIdx)
  );
  if(!adaptacioData.dismissed) adaptacioData.dismissed = [];
  adaptacioData.dismissed.push(proposal.weekIdx);
  saveAdaptacio();
  renderAll();
}

function getActiveProposals(){
  checkAllWeeksForAdaptation();
  return (adaptacioData.proposals||[]).filter(p => p.type !== 'on_track');
}

function getPositiveProposals(){
  return (adaptacioData.proposals||[]).filter(p => p.type === 'on_track');
}

function renderAdaptacioProposals(){
  const active = getActiveProposals();
  const positive = getPositiveProposals();
  if(active.length === 0 && positive.length === 0) return '';

  const SEVERITY_STYLE = {
    danger:  {bg:'#FEF2F2', border:'rgba(185,28,28,0.3)', col:'#B91C1C', icon:'🚨'},
    warning: {bg:'#FFFBEB', border:'rgba(146,64,14,0.3)', col:'#92400E', icon:'⚠️'},
    success: {bg:'#EEF3E8', border:'rgba(45,80,22,0.3)',  col:'#2D5016', icon:'✅'},
  };

  let html = '';

  [...active, ...positive].forEach(p => {
    const st = SEVERITY_STYLE[p.severity]||SEVERITY_STYLE.warning;
    html += `<div style="background:${st.bg};border:1px solid ${st.border};border-radius:10px;padding:14px;margin-bottom:10px;">
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;">
        <span style="font-size:16px;flex-shrink:0">${st.icon}</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500;color:${st.col};margin-bottom:3px">${p.title}</div>
          <div style="font-size:11px;font-weight:300;color:#78716C;line-height:1.6">${p.reason}</div>
          ${p.action?`<div style="font-size:11px;font-weight:400;color:${st.col};margin-top:4px;line-height:1.6">→ ${p.action}</div>`:''}
        </div>
      </div>
      <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px;">
        <button onclick="dismissAdaptation(${JSON.stringify(p).replace(/"/g,'&quot;')})"
          style="font-family:'Fira Sans',system-ui;font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid #C8C2BB;background:transparent;color:#78716C;cursor:pointer;">
          Ignorar
        </button>
        ${p.type==='repeat_week'?`<button onclick="applyAdaptation(${JSON.stringify(p).replace(/"/g,'&quot;')})"
          style="font-family:'Fira Sans',system-ui;font-size:11px;font-weight:500;padding:4px 12px;border-radius:6px;border:1px solid ${st.col};background:${st.col};color:#fff;cursor:pointer;">
          Aplicar canvi
        </button>`:''}
        ${p.type==='on_track'?`<button onclick="dismissAdaptation(${JSON.stringify(p).replace(/"/g,'&quot;')})"
          style="font-family:'Fira Sans',system-ui;font-size:11px;font-weight:500;padding:4px 12px;border-radius:6px;border:1px solid ${st.col};background:${st.col};color:#fff;cursor:pointer;">
          ✓ Entès
        </button>`:''}
      </div>
    </div>`;
  });

  return html;
}

// Rotació automàtica per data, canviable manualment
let alimentVariants = {}; // {dayType: variantIdx}

function getAutoVariant(dayType){
  // Rota automàticament: usa el dia de l'any per escollir la variant (0,1,2)
  const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0)) / 86400000);
  return dayOfYear % 3;
}

function getVariantIdx(dayType){
  if(alimentVariants[dayType]!==undefined) return alimentVariants[dayType];
  return getAutoVariant(dayType);
}

function setVariant(dayType, idx){
  alimentVariants[dayType] = idx;
  openMeal = null;
  renderAliment();
}

let alimentDayType = 'trail';
let openMeal = null;

function getDayTypeFromToday(){
  const today = todayISO();
  // Mirar si avui hi ha sessió planificada per determinar el tipus de dia
  let hasTrail=false, hasBici=false, hasForca=false;
  PLA_CARDIO.forEach(w=>{
    Object.entries(w.sessions).forEach(([slot,s])=>{
      if(s.date===today){
        if(s.sport==='trail') hasTrail=true;
        if(s.sport==='bici') hasBici=true;
      }
    });
  });
  PLA_FORCA.forEach(w=>{
    Object.entries(w.sessions).forEach(([day,sess])=>{
      if(sess.date===today) hasForca=true;
    });
  });
  if(hasTrail) return 'trail';
  if(hasBici) return 'bici';
  if(hasForca) return 'forca';
  return 'descans';
}

function renderAliment(){
  const el = document.getElementById('tab-aliment');
  if(!el) return;

  // Auto-detectar tipus de dia si és la primera vegada
  if(!window._alimentInit){
    alimentDayType = getDayTypeFromToday();
    window._alimentInit = true;
  }

  const menu = MENUS_DATA[alimentDayType];
  const varIdx = getVariantIdx(alimentDayType);
  const variant = menu.variants[varIdx];
  const aparts = Object.entries(variant.aparts);
  const totalKcal = aparts.reduce((a,[,v])=>a+v.kcal,0); // variant 
  const totalP = aparts.reduce((a,[,v])=>a+v.p,0);

  let html = '';

      <span class="macro-bar-val">${menu.p} g</span>

  </div>`;

  // Àpats
  html += `<div style="font-size:11px;font-weight:500;color:#78716C;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">Menú del dia</div>`;

  aparts.forEach(([slot, apart]) => {

        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:12px;">
          <div class="meal-macros">
            <span class="macro-badge" style="color:#2D5016;background:#EEF3E8">${apart.p}g P</span>
            <span class="macro-badge" style="color:#1D4ED8;background:#EFF6FF">${apart.c}g C</span>
            <span style="font-size:11px;font-weight:500;color:#1C1917">${apart.kcal} kcal</span>
          </div>
          <span style="font-size:12px;color:#C8C2BB">${isOpen?'▲':'▼'}</span>
        </div>
      </div>
      ${isOpen?`<div class="meal-body">
        <div style="font-size:11px;font-weight:500;color:#78716C;margin-bottom:4px;letter-spacing:0.04em;">INGREDIENTS</div>

          ${apart.ingredients.map(i=>`<li>${i}</li>`).join('')}

        <ol class="prep-list">
          ${apart.prep.map(p=>`<li>${p}</li>`).join('')}
        </ol>
        <div style="display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid #E5E1DC;">

          <span style="font-size:11px;font-weight:300;color:#78716C">Carbohidrats: <strong style="color:#1D4ED8">${apart.c}g</strong></span>

        </div>
      </div>`:''}
    </div>`;
  });

  el.innerHTML = html;
}

let actsFilter = 'all';

function renderActivitats(){

  if(!el) return;

  const today = todayISO();

  // Estadístiques acumulades
  const planStart = '2026-06-29';
  const actsFromPlan = acts.filter(a=>a.date>=planStart);

  const totalKm   = actsFromPlan.reduce((s,a)=>s+(a.km||0),0);
  const totalDp   = actsFromPlan.reduce((s,a)=>s+(a.dplus||0),0);
  const totalMin  = actsFromPlan.reduce((s,a)=>s+(a.temps||0),0);

  const histKm    = Math.round(actsAll.reduce((s,a)=>s+(a.km||0),0));

    return d.toISOString().split('T')[0];
  })();

  let html = '';

  // Estadístiques des del pla

  const filtres = [['all','Totes',histActs],['pla','📅 Des del pla',totalActs], ...Object.entries(sportCounts).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[k,(SPORT_META[k]||{emoji:'•',label:k}).emoji+' '+(SPORT_META[k]||{label:k}).label,v])];

      byWeek[wk].push(a);
    });

    Object.keys(byWeek).sort((a,b)=>b.localeCompare(a)).forEach(wk=>{
      const wActs = byWeek[wk];
      const wKm = wActs.reduce((s,a)=>s+(a.km||0),0);
      const wMin = wActs.reduce((s,a)=>s+(a.temps||0),0);
      const isCurrentWeek = wk===weekStart;

      html+=`<div style="margin-bottom:16px;">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:11px;font-weight:500;color:#78716C;letter-spacing:0.06em;text-transform:uppercase;">${isCurrentWeek?'Aquesta setmana':fmtDate(wk)}</span>
          <span style="font-size:11px;font-weight:300;color:#78716C;">${wActs.length} act${wActs.length>1?'s':''} · ${wKm.toFixed(1)} km${wMin>0?' · '+Math.floor(wMin/60)+'h'+String(wMin%60).padStart(2,'0')+'min':''}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:1px;">
          ${wActs.map((a,idx)=>{
            const meta = SPORT_META[a.sport]||{emoji:'•',label:a.sport,col:'#78716C',bg:'#F7F5F2'};
            const br = idx===0?'10px 10px 0 0':idx===wActs.length-1?'0 0 10px 10px':'0';
            const tempsStr = a.temps ? `${Math.floor(a.temps/60)}h${String(a.temps%60).padStart(2,'0')}min` : '';
            const dayName = new Date(a.date+'T00:00:00').toLocaleDateString('ca-ES',{weekday:'short',day:'numeric',month:'short'});
            return `<div style="border-radius:${br};border:1px solid #E5E1DC;border-top:${idx>0?'none':'1px solid #E5E1DC'};background:#FFFFFF;padding:10px 14px;">
              <div style="display:flex;align-items:center;gap:10px;">
                <div style="width:32px;height:32px;border-radius:8px;background:${meta.bg};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">${meta.emoji}</div>
                <div style="flex:1;min-width:0;">
                  <div style="font-size:13px;font-weight:500;color:#1C1917;margin-bottom:2px;">${a.nom||meta.label}</div>
                  <div style="font-size:11px;font-weight:300;color:#78716C;display:flex;gap:8px;flex-wrap:wrap;">
                    <span>${dayName}</span>
                    ${a.km?`<span>${a.km.toFixed(1)} km</span>`:''}
                    ${a.dplus?`<span>D+${a.dplus} m</span>`:''}
                    ${tempsStr?`<span>${tempsStr}</span>`:''}
                    ${a.fcAvg?`<span>${a.fcAvg} bpm</span>`:''}
                    ${a.pace?`<span>${a.pace}/km</span>`:''}
                  </div>
                </div>
                <span style="font-size:10px;font-weight:500;color:${meta.col};background:${meta.bg};padding:2px 7px;border-radius:20px;flex-shrink:0;">${meta.label}</span>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    });
  }

  el.innerHTML = html;
}

function setActsFilter(f){ actsFilter=f; renderActivitats(); }

function renderAll(){
  renderAvui();
  renderCardio();
  renderForca();
  renderAliment();
  renderActivitats();
  // Actualitzar indicador de preparació física
  const f=calcFitness();
  const bar=document.getElementById('fitness-bar');
  const fill=document.getElementById('fitness-fill');
  const pct=document.getElementById('fitness-pct');
  const detail=document.getElementById('fitness-detail');
  if(f.maxKmReal>0||f.maxDpReal>0||f.kmBiciAcc>0){
    bar.style.display='block';
    fill.style.width=f.total+'%';
    pct.textContent=f.total+'%';
    const col=f.total<30?'#92400E':f.total<60?'#1D4ED8':'#2D5016';
    pct.style.color=col;
    fill.style.background=f.total<30?'linear-gradient(90deg,#B45309,#D97706)':f.total<60?'linear-gradient(90deg,#1D4ED8,#3B82F6)':'linear-gradient(90deg,#2D5016,#4A8A2A)';
    detail.innerHTML=[
      {l:'Trail llarg',v:f.maxKmReal.toFixed(1)+' km',p:f.pKm},
      {l:'D+ màx',v:f.maxDpReal+' m',p:f.pDp},
      {l:'Bici acc.',v:Math.round(f.kmBiciAcc)+' km',p:f.pBici},
    ].map(i=>`<span style="font-size:10px;font-weight:300;color:#78716C;">${i.l}: <strong style="color:#1C1917">${i.v}</strong> <span style="color:#A8A29E">(${i.p}%)</span></span>`).join('');
  } else {
    bar.style.display='none';
  }
}
